version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: chat-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: db_01
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - chat-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Spring Boot Application
  chat-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-application
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      # Spring Profile
      SPRING_PROFILES_ACTIVE: prod
      
      # MongoDB Configuration
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: chat
      
      # AWS S3 Configuration (use your actual credentials)
      AWS_S3_ACCESS_KEY: ${AWS_ACCESS_KEY_ID:-your-access-key}
      AWS_S3_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY:-your-secret-key}
      AWS_S3_REGION: ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET:-chat-app-uploads}
      
      # Socket.IO Configuration
      SOCKETIO_HOST: 0.0.0.0
      SOCKETIO_PORT: 9092
      
      # JVM Options
      JAVA_OPTS: -Xmx512m -Xms256m
    ports:
      - "8080:8080"   # REST API
      - "9092:9092"   # Socket.IO
    volumes:
      - app_logs:/app/logs
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # MongoDB Express (Web-based MongoDB admin interface) - Optional
  mongo-express:
    image: mongo-express:1.0.2
    container_name: chat-mongo-express
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    networks:
      - chat-network

networks:
  chat-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  app_logs:
    driver: local
