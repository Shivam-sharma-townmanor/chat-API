# Production Configuration
spring.application.name=Chat-process-feature

# Application
server.port=8080

# MongoDB Configuration (using environment variables)
spring.data.mongodb.host=${SPRING_DATA_MONGODB_HOST:localhost}
spring.data.mongodb.port=${SPRING_DATA_MONGODB_PORT:27017}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:db_01}
spring.data.mongodb.auto-index-creation=true

# MongoDB Connection Pool
spring.data.mongodb.uuid-representation=standard

# AWS S3 Configuration (using environment variables)
aws.s3.access-key=${AWS_S3_ACCESS_KEY}
aws.s3.secret-key=${AWS_S3_SECRET_KEY}
aws.s3.region=${AWS_S3_REGION:us-east-1}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}

# Socket.IO Configuration (using environment variables)
socketio.host=${SOCKETIO_HOST:0.0.0.0}
socketio.port=${SOCKETIO_PORT:9092}
socketio.bossThreads=${SOCKETIO_BOSS_THREADS:1}
socketio.workerThreads=${SOCKETIO_WORKER_THREADS:100}
socketio.allowCustomRequests=true
socketio.upgradeTimeout=10000
socketio.pingTimeout=60000
socketio.pingInterval=25000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.root=INFO
logging.level.in.banking.aap=INFO
logging.level.com.corundumstudio.socketio=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Production optimizations
spring.jmx.enabled=false
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# Error handling
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
