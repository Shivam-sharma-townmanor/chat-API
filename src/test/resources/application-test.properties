# Test Configuration - Simplified for Local Development
spring.application.name=chat-test

# MongoDB - Embedded for testing
spring.data.mongodb.uri=mongodb://localhost:27017/chat_test
spring.data.mongodb.auto-index-creation=true

# AWS S3 - Mock for testing
aws.s3.access-key=test-access-key
aws.s3.secret-key=test-secret-key
aws.s3.region=us-east-1
aws.s3.bucket-name=test-bucket

# Socket.IO - Test configuration
socketio.host=localhost
socketio.port=9093
socketio.bossThreads=1
socketio.workerThreads=10

# Logging
logging.level.root=WARN
logging.level.com.example.chat=DEBUG
